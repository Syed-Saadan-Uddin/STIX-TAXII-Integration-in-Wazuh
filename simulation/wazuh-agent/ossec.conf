<ossec_config>
  <client>
    <server>
      <address>__WAZUH_MANAGER_SERVER__</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>linux, container, wazuh-test-agent</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <labels>
    <label key="lab.role">simulation</label>
    <label key="lab.source">docker-test-generator</label>
  </labels>

  <localfile>
    <location>/var/log/wazuh-test/auth.log</location>
    <log_format>syslog</log_format>
    <only-future-events>yes</only-future-events>
  </localfile>
</ossec_config>
