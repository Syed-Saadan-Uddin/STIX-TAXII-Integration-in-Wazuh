version: '3.8'

services:
  wazuh-ti:
    build: .
    container_name: wazuh-ti
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - wazuh_var_ossec:/var/ossec
    environment:
      - CONFIG_PATH=/app/config.yaml
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - wazuh-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  wazuh_var_ossec:
    external: true
    name: single-node_wazuh_var_ossec # Match Wazuh Docker volume name

networks:
  wazuh-net:
    external: true
    name: single-node_default # Match Wazuh Docker network name
