version: '3.8'

services:
  wazuh-ti:
    build: .
    container_name: wazuh-ti
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
    environment:
      - CONFIG_PATH=/app/config.yaml
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - wazuh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  taxii-mock:
    image: python:3.11-slim
    container_name: taxii-mock
    working_dir: /app
    command: >
      sh -c "pip install flask stix2 -q &&
             python mock_taxii_server.py"
    volumes:
      - ./simulation/stix_bundle.json:/app/stix_bundle.json
      - ./simulation/mock_taxii_server.py:/app/mock_taxii_server.py
    ports:
      - "9000:9000"
    networks:
      - wazuh-net

volumes:
  wazuh_etc:
    external: true
    name: single-node_wazuh_etc # Match Wazuh 4.x Docker volume name
  wazuh_logs:
    external: true
    name: single-node_wazuh_logs

networks:
  wazuh-net:
    external: true
    name: single-node_default # Match Wazuh Docker network name
