database:
  path: /app/data/wazuh_ti.db

wazuh:
  cdb_list_path: /app/data/threat_intel
  reload_command: echo "CDB updated"
  log_path: /app/logs/wazuh-ti.log

scheduler:
  default_interval_minutes: 60
  auto_sync_enabled: true

api:
  host: 0.0.0.0
  port: 8000
  api_key_enabled: false
  api_key: null

ml:
  enabled: true
  model_path: /app/data/models/threat_predictor.pkl
  demo_seed_size: 12
  lookback_hours: 24
  default_host_criticality: 3
  live_enrichment_enabled: true

threat_intel:
  otx_api_key: null
  abuse_ch_api_key: null
  abuseipdb_api_key: null

logging:
  level: INFO
  file: /app/logs/wazuh-ti.log
  max_size_mb: 50
  backup_count: 5
